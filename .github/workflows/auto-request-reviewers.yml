name: Auto request reviewers

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  contents: read

jobs:
  request-reviewers:
    runs-on: ubuntu-latest

    steps:
      - name: Request the other admins as reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const allReviewers = ['spassimirag', 'stefanova-kalina', 'AllyVA'];

            const author = context.payload.pull_request.user.login;

            const reviewers = allReviewers.filter(
              username => username.toLowerCase() !== author.toLowerCase()
            );

            if (reviewers.length === 0) {
              core.info(`No reviewers to request for author: ${author}`);
              return;
            }

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers
            });

            core.info(`Requested reviewers: ${reviewers.join(', ')}`);
